{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<div style="margin-bottom:15px;">
    <a href="/" style="margin-right:10px;">🌱 Planting</a>
    <a href="/harvesting/" style="margin-right:10px;">🌾 Harvesting</a>
    <a href="/dashboard/">📊 Dashboard</a>
</div>

<div class="container">
    <h2>🌾 Harvesting Form</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="barangay" placeholder="Barangay" required>
        <input type="number" name="area" placeholder="Area Harvested" required>
        <input type="number" name="yield" placeholder="Average Yield" required>
        <input type="number" name="volume" placeholder="Volume of Production" required>

        <p><b>Signature:</b></p>
        <canvas id="pad" width="100%" height="150" style="border:1px solid #ccc;"></canvas>

        <input type="hidden" name="signature" id="signature">

        <br>
        <button type="button" onclick="save()">Submit</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad"></script>
<script>
const pad = new SignaturePad(document.getElementById('pad'));

function save() {
    document.getElementById('signature').value = pad.toDataURL();
    document.forms[0].submit();
}
</script>
